name: lizard_fitness
description: "Lizard Fitness - Training-first gym app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.5

  # Navigation
  go_router: ^15.1.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI / Charts
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
